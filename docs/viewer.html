<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FilStream viewer</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var hasVideo = (p.get("videoId") || "").trim() !== "";
      var embed = p.get("embed") === "true";
      if (!hasVideo && !embed) {
        var u = new URL("index.html", location.href);
        u.search = location.search;
        u.hash = location.hash;
        location.replace(u.href);
      }
    })();
  </script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="viewer/viewer.css" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/controls.css"
  />
</head>
<body>
  <script>
    window.__FILSTREAM_CONFIG__ = window.__FILSTREAM_CONFIG__ || {};
  </script>
  <div id="root" class="viewer-layout">
    <div class="viewer-main">
      <header id="viewer-brand-mount" class="viewer-brand" role="banner"></header>
      <p class="viewer-status" id="viewer-status">Loading…</p>
      <div class="viewer-player-block">
        <div id="viewer-shaka-container" class="viewer-shaka-container">
          <video id="viewer-video" playsinline></video>
        </div>
      </div>
      <viewer-meta-block
        id="viewer-meta"
        class="viewer-meta"
        hidden
        aria-label="About this video"
      ></viewer-meta-block>
    </div>
    <viewer-catalog-sidebar
      id="viewer-catalog"
      class="viewer-catalog"
      hidden
      aria-label="Catalog"
    ></viewer-catalog-sidebar>
  </div>

  <script type="module" src="viewer/viewer.mjs"></script>
</body>
</html>
