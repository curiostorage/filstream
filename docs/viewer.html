<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FilStream viewer</title>
  <link rel="stylesheet" href="viewer/viewer.css" />
</head>
<body>
  <div id="root" class="viewer-layout">
    <div class="viewer-main">
      <p class="viewer-status" id="viewer-status">Loading…</p>
      <video id="viewer-video" controls playsinline></video>
    </div>
    <aside id="viewer-catalog" class="viewer-catalog" hidden aria-label="Catalog"></aside>
  </div>
  <script type="module" src="viewer/viewer.mjs"></script>
</body>
</html>
