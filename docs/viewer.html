<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <script>
    (function () {
      var next = new URL("view/" + location.search + location.hash, location.href);
      location.replace(next.href);
    })();
  </script>
</head>
<body>
  <p><a href="view/">Continue to viewer</a></p>
</body>
</html>
