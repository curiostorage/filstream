<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FilStream — Own your movies</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap landing-wrap">
    <header id="landing-header-mount" class="landing-brand" aria-label="FilStream" role="banner"></header>

    <h1 class="landing-headline">Own your movies:</h1>
    <ul class="landing-list">
      <li>No Terms of Service</li>
      <li>No gatekeepers</li>
      <li>No central owning company</li>
      <li>Get 100% of ads revenue if you want them (coming soon)</li>
      <li>Just pay for space on Filecoin: under 0.01 USDFC per movie hour per year.</li>
    </ul>

    <p class="landing-cta">
      <a class="btn btn-primary" href="upload.html">Upload a movie</a>
    </p>
  </div>
  <script>
    window.__FILSTREAM_CONFIG__ = window.__FILSTREAM_CONFIG__ || {};
  </script>
  <script type="module">
    import { mountFilstreamHeader } from "./filstream-brand.mjs";
    const mount = document.getElementById("landing-header-mount");
    if (mount) mountFilstreamHeader(mount, { active: "home" });
  </script>
</body>
</html>
