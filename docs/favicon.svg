<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" role="img" aria-label="Filecoin Video Streamer favicon">
  <!-- Film strip body -->
  <rect width="52" height="52" rx="9" fill="#18C8FF"/>

  <!-- Film perforations (even vertical tiling) -->
  <g fill="#0B0F1A">
    <!-- Left side -->
    <rect x="3" y="0"  width="5" height="6" rx="1.5"/>
    <rect x="3" y="8"  width="5" height="6" rx="1.5"/>
    <rect x="3" y="16" width="5" height="6" rx="1.5"/>
    <rect x="3" y="24" width="5" height="6" rx="1.5"/>
    <rect x="3" y="32" width="5" height="6" rx="1.5"/>
    <rect x="3" y="40" width="5" height="6" rx="1.5"/>

    <!-- Right side -->
    <rect x="44" y="0"  width="5" height="6" rx="1.5"/>
    <rect x="44" y="8"  width="5" height="6" rx="1.5"/>
    <rect x="44" y="16" width="5" height="6" rx="1.5"/>
    <rect x="44" y="24" width="5" height="6" rx="1.5"/>
    <rect x="44" y="32" width="5" height="6" rx="1.5"/>
    <rect x="44" y="40" width="5" height="6" rx="1.5"/>
  </g>

  <!-- Inner screen -->
  <rect x="12" y="7" width="28" height="39" rx="5" fill="#0B0F1A"/>

  <!-- Rotated flux symbol -->
  <g transform="rotate(20 26 26)">
    <text x="26" y="32"
          text-anchor="middle"
          font-size="30"
          fill="#FFFFFF"
          font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
      ⨎
    </text>
  </g>
</svg>
