<!DOCTYPE html>
<html lang="en">
<head>
  <base href="../" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FilStream viewer</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var hasVideo = (p.get("videoId") || "").trim() !== "";
      var embed = p.get("embed") === "true";
      if (!hasVideo && !embed) {
        var u = new URL("index.html", document.baseURI);
        u.search = location.search;
        u.hash = location.hash;
        location.replace(u.href);
      }
    })();
  </script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/controls.css"
  />
  <link rel="stylesheet" href="components/filstream-catalog-app.css" />
</head>
<body>
  <script>
    window.__FILSTREAM_CONFIG__ = window.__FILSTREAM_CONFIG__ || {};
  </script>
  <filstream-catalog-app></filstream-catalog-app>
  <script type="module" src="components/catalog-app.mjs"></script>
</body>
</html>
