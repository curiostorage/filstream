<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Filecoin Video Streamer favicon">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0B0F1A"/>

  <!-- Film strip body -->
  <rect x="10" y="8" width="44" height="48" rx="8" fill="#18C8FF"/>

  <!-- Film perforations (even vertical tiling) -->
  <g fill="#0B0F1A">
    <!-- Left side -->
    <rect x="13" y="8"  width="5" height="6" rx="1.5"/>
    <rect x="13" y="16" width="5" height="6" rx="1.5"/>
    <rect x="13" y="24" width="5" height="6" rx="1.5"/>
    <rect x="13" y="32" width="5" height="6" rx="1.5"/>
    <rect x="13" y="40" width="5" height="6" rx="1.5"/>
    <rect x="13" y="48" width="5" height="6" rx="1.5"/>

    <!-- Right side -->
    <rect x="46" y="8"  width="5" height="6" rx="1.5"/>
    <rect x="46" y="16" width="5" height="6" rx="1.5"/>
    <rect x="46" y="24" width="5" height="6" rx="1.5"/>
    <rect x="46" y="32" width="5" height="6" rx="1.5"/>
    <rect x="46" y="40" width="5" height="6" rx="1.5"/>
    <rect x="46" y="48" width="5" height="6" rx="1.5"/>
  </g>

  <!-- Inner screen -->
  <rect x="20" y="14" width="24" height="36" rx="4" fill="#0B0F1A"/>

  <!-- Rotated flux symbol -->
  <g transform="rotate(20 32 32)">
    <text x="32" y="38"
          text-anchor="middle"
          font-size="28"
          fill="#FFFFFF"
          font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
      ⨎
    </text>
  </g>
</svg>